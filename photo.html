```html
<!DOCTYPE html>
<html lang="zh">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Yi Photography</title>

<script src="https://cdn.jsdelivr.net/npm/exif-js"></script>

<style>

body{
background:#0b0b0b;
color:white;
font-family:Helvetica,Arial;
margin:0;
}

header{
text-align:center;
padding:40px;
letter-spacing:3px;
}

.upload{
text-align:center;
margin-bottom:30px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:20px;
padding:40px;
}

.card{
background:#111;
border-radius:8px;
overflow:hidden;
}

.card img{
width:100%;
display:block;
}

.meta{
padding:10px;
font-size:13px;
color:#bbb;
line-height:1.6;
}

</style>
</head>

<body>

<header>
<h1>YI PHOTOGRAPHY</h1>
</header>

<div class="upload">
<input type="file" id="upload" multiple accept="image/*">
</div>

<div class="gallery" id="gallery"></div>

<script>

const upload=document.getElementById("upload");
const gallery=document.getElementById("gallery");

upload.addEventListener("change",function(){

for(let file of upload.files){

let reader=new FileReader();

reader.onload=function(e){

let img=new Image();
img.src=e.target.result;

let card=document.createElement("div");
card.className="card";

let image=document.createElement("img");
image.src=e.target.result;

let meta=document.createElement("div");
meta.className="meta";

card.appendChild(image);
card.appendChild(meta);
gallery.appendChild(card);

EXIF.getData(img,function(){

let camera=EXIF.getTag(this,"Model");
let lens=EXIF.getTag(this,"LensModel");
let iso=EXIF.getTag(this,"ISOSpeedRatings");
let aperture=EXIF.getTag(this,"FNumber");
let shutter=EXIF.getTag(this,"ExposureTime");
let focal=EXIF.getTag(this,"FocalLength");

meta.innerHTML=
"Camera: "+camera+"<br>"+
"Lens: "+lens+"<br>"+
"ISO: "+iso+"<br>"+
"Aperture: f/"+aperture+"<br>"+
"Shutter: 1/"+Math.round(1/shutter)+"s<br>"+
"Focal: "+focal+"mm";

});

}

reader.readAsDataURL(file);

}

});

</script>

</body>

</html>
